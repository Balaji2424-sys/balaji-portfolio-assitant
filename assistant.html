<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant — Balaji Parasuraman</title>

  <!-- Same font stack as the portfolio, loaded identically -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800;900&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Base portfolio theme (source of truth for tokens) -->
  <link rel="stylesheet" href="style.css" />
  <!-- Assistant-only layout, built entirely on top of the tokens above -->
  <link rel="stylesheet" href="src/css/assistant.css" />
</head>
<body>

  <div id="particles-js"></div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <div class="ai-shell">

    <!-- ========== HEADER (slim) ========== -->
    <header class="ai-header">
      <a href="index.html" class="ai-back-link" id="backToPortfolio">
        &#8592; Portfolio
      </a>
      <div class="ai-header-right">
        <button class="ai-icon-btn active" id="previewToggle" aria-label="Toggle preview panel" title="Toggle preview panel">
          &#9636;
        </button>
        <button class="theme-toggle ai-icon-btn" id="themeToggle" aria-label="Toggle theme">
          <span class="icon-sun">&#9728;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
    </header>

    <!-- ========== THREE-PANEL LAYOUT ========== -->
    <div class="ai-layout" id="aiLayout">

      <!-- LEFT: suggested questions / quick nav -->
      <aside class="ai-panel-left" id="panelLeft">
        <div class="ai-panel-heading">Ask me about</div>
        <div id="suggestedChips">
          <button class="ai-chip" data-question="Tell me about yourself">Tell me about yourself</button>
          <button class="ai-chip" data-question="Show me your projects">My projects</button>
          <button class="ai-chip" data-question="What is your education background?">Education</button>
          <button class="ai-chip" data-question="What internships have you done?">Internships</button>
          <button class="ai-chip" data-question="Tell me about your leadership experience">Leadership</button>
          <button class="ai-chip" data-question="Can I see your resume?">Resume</button>
          <button class="ai-chip" data-question="How can I contact you?">Contact</button>
        </div>
      </aside>

      <!-- CENTER: conversation -->
      <main class="ai-conversation">

        <div class="ai-floating-avatar">
          <img src="assets/11.png" alt="Balaji Parasuraman" />
          <div class="name">Balaji Parasuraman</div>
          <div class="tagline">AI &amp; Data Science Engineer</div>
        </div>

        <div class="ai-messages" id="messages" aria-live="polite">
          <!-- Messages injected here by chat.js / ui.js -->
        </div>

        <nav class="ai-quicknav" id="quickNav">
          <button class="ai-quicknav-pill" data-question="Tell me about yourself">&#128100; Me</button>
          <button class="ai-quicknav-pill" data-question="Show me your projects">&#128188; Projects</button>
          <button class="ai-quicknav-pill" data-question="Tell me about your experience and internships">&#128196; Experience</button>
          <button class="ai-quicknav-pill" data-question="What are your skills?">&#10024; Skills</button>
          <button class="ai-quicknav-pill" data-question="How can I contact you?">&#9993; Contact</button>
        </nav>

        <form class="ai-input-bar" id="chatForm">
          <div class="ai-input-pill">
            <textarea
              class="ai-input"
              id="chatInput"
              rows="1"
              placeholder="Ask me anything..."
              aria-label="Message"
            ></textarea>
          </div>
          <button type="submit" class="ai-send-btn" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </main>

      <!-- RIGHT: rich card / gallery / PDF preview (resizable + closable) -->
      <div class="ai-resizer" id="panelResizer"></div>
      <aside class="ai-panel-right" id="panelRight">
        <div class="ai-panel-right-header">
          <div class="ai-panel-heading">Preview</div>
          <button class="ai-icon-btn" id="panelRightClose" aria-label="Close preview panel" title="Close preview panel">&times;</button>
        </div>
        <div id="previewSlot">
          <p class="ai-empty-preview">
            Project cards, certificates, and documents I mention will preview here.
          </p>
        </div>
      </aside>

    </div>
  </div>

  <!-- Modal mount points for PDF viewer / gallery lightbox -->
  <div id="modalRoot"></div>

  <!-- Module scripts — order matters: utils/markdown first, app.js last -->
  <script src="src/js/utils.js"></script>
  <script src="src/js/markdown.js"></script>
  <script src="src/js/actions.js"></script>
  <script src="src/js/renderer.js"></script>
  <script src="src/js/gallery.js"></script>
  <script src="src/js/pdfViewer.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/chat.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
